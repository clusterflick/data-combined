name: Rerun failed runs

# Automatically re-runs the failed jobs of the pipeline workflow when it fails,
# up to 3 total attempts. This recovers from transient failures (npm registry
# blips, flaky venue sites, runner hiccups) without waiting for a manual restart.

on:
  # zizmor: ignore[dangerous-triggers]
  # This workflow does not check out or execute any code from the run that
  # triggered it; it only calls `gh run rerun` with that run's id. There is no
  # untrusted-input surface, so the dangerous-triggers advisory is a false
  # positive here.
  workflow_run:
    workflows: ["Combine Data"]
    types: [completed]

permissions: {}

jobs:
  rerun:
    name: Re-run failed jobs
    # Only when the run genuinely failed, and cap the total attempts so a
    # persistently broken run doesn't loop forever (attempt 1 -> 2 -> 3).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run rerun "$RUN_ID" --failed
